name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single supported-and-tested interpreter. The package still declares
  # requires-python >=3.12; CI verifies the latest release only.
  PYTHON_VERSION: "3.14"
  # Hypothesis profile for CI - more examples, no deadline
  HYPOTHESIS_PROFILE: ci
  UV_SYSTEM_PYTHON: "1"

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install -e ".[all]"

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy .

  # Unit + integration + property tests in one xdist-parallel run.
  # 4 vCPU: the suite is CPU-bound and scales with workers.
  test:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install -e ".[all]"

      - name: Run test suite
        run: |
          pytest tests/ \
            -n auto \
            -q \
            --timeout=120 \
            --cov=claude_task_master \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            2>&1 | tee pytest.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-output
          path: pytest.txt
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Build + CLI smoke test. Independent of `test` on purpose — running them in
  # parallel rather than after it keeps wall-clock at max(job), not sum(jobs).
  package:
    name: Build & CLI Smoke Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Install package
        run: uv pip install -e ".[all]"

      - name: Test CLI help command
        run: claudetm --help

      - name: Test CLI doctor command
        run: claudetm doctor || true  # May fail without credentials, but shouldn't crash

      - name: Test CLI status command
        run: claudetm status || true  # May fail without state, but shouldn't crash

  # Docker builds are handled in docker-publish.yml workflow
  # which runs only on version tag releases (v*.*.*)
  # This keeps PR CI fast and focused on code quality
